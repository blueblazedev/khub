name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3
      - name: shellcheck + bash 3.2 syntax
        run: |
          set -euo pipefail
          # shellcheck ships on GitHub-hosted ubuntu and macos runners.
          command -v shellcheck >/dev/null || { echo "shellcheck missing on ${{ matrix.os }}"; exit 1; }
          shellcheck khub install.sh
          # macos /bin/bash is 3.2 — this run proves the scripts parse under it.
          bash -n khub
          bash -n install.sh
