name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3
      - name: shellcheck (where available) + bash 3.2 syntax
        run: |
          set -euo pipefail
          # shellcheck is preinstalled on ubuntu runners, NOT macos. Its analysis is
          # OS-independent, so the ubuntu leg provides full static-analysis coverage.
          if command -v shellcheck >/dev/null; then
            shellcheck khub install.sh tests/telemetry/*.sh
          else
            echo "shellcheck not preinstalled on ${{ matrix.os }} — ubuntu leg covers static analysis"
          fi
          # macOS /bin/bash is 3.2 (the compatibility floor) — prove everything parses under it.
          /bin/bash -n khub
          /bin/bash -n install.sh
          for t in tests/telemetry/*.sh; do /bin/bash -n "$t"; done

  telemetry:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10   # v6.0.3
      - name: telemetry helper + track-verb tests (python3 hook, bash CLI)
        run: |
          set -euo pipefail
          python3 --version
          # settings.json merge/unmerge/status correctness + non-destruction
          bash tests/telemetry/test_settings_merge.sh
          # end-to-end `khub track` verbs in a sandboxed HOME/XDG
          bash tests/telemetry/test_track_verbs.sh
          # SessionEnd rollup: transcript -> process metrics, fail-open, determinism
          bash tests/telemetry/test_capture_metrics.sh
