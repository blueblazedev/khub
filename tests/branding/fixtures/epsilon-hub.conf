# Fixture brand conf for the brand compiler — the FICTIONAL pilot brand used by the
# public engine's own tests and CI. Real client confs never enter this repo; they
# live in the private khub-brands repo (Phase 4).
#
# Deliberately exercises the general cases:
#   * slug contains a hyphen            -> slug_ident derivation (epsilon_hub)
#   * cli_repo basename != slug         -> composed KHUB_REPO line-substitution
#   * content_repo basename != hub_dirname -> the two are independent fields

slug=epsilon-hub
display_name=Epsilon Hub
env_prefix=EPSILON_HUB
org=epsilon-labs
cli_repo=epsilon-labs/epsilon-hub-cli
content_repo=epsilon-labs/epsilon-hub-content
hub_dirname=epsilon-knowledge
bot_author=epsilon-hub-bot
bot_subject_prefix=publish: epsilon snapshot
ghec=false
default_branch=main
